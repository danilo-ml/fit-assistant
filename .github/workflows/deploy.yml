name: Deploy to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - production

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: '3.12'

jobs:
  package:
    name: Package Lambda
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create package directory
        run: mkdir -p build/lambda-package

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -t build/lambda-package/ --upgrade

      - name: Copy source code to package root
        run: |
          cp -r src/* build/lambda-package/

      - name: Remove unnecessary files
        run: |
          cd build/lambda-package
          find . -type d -name "tests" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find . -type f -name "*.pyc" -delete
          find . -type f -name "*.pyo" -delete
          find . -type d -name "*.dist-info" ! -name "opentelemetry*" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name "*.egg-info" -exec rm -rf {} + 2>/dev/null || true

      - name: Create deployment package
        run: |
          cd build/lambda-package
          zip -r ../lambda.zip . -q

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-package
          path: build/lambda.zip
          retention-days: 7

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: package
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    permissions:
      id-token: write
      contents: read
    environment:
      name: production
      url: https://console.aws.amazon.com/cloudformation
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download Lambda package
        uses: actions/download-artifact@v4
        with:
          name: lambda-package
          path: build/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::429649512384:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload to S3
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          aws s3 cp build/lambda.zip s3://fitagent-lambda-deployments-429649512384/production/lambda-${TIMESTAMP}.zip
          aws s3 cp build/lambda.zip s3://fitagent-lambda-deployments-429649512384/production/lambda-latest.zip

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/template.yml \
            --stack-name fitagent-production \
            --parameter-overrides \
              Environment=production \
              BedrockModelId=anthropic.claude-3-sonnet-20240229-v1:0 \
              DomainName=fitassistant.com.br \
            --capabilities CAPABILITY_NAMED_IAM \
            --region ${{ env.AWS_REGION }} \
            --no-fail-on-empty-changeset

      - name: Update Lambda functions
        run: |
          aws lambda update-function-code \
            --function-name fitagent-webhook-handler-production \
            --s3-bucket fitagent-lambda-deployments-429649512384 \
            --s3-key production/lambda-latest.zip \
            --region ${{ env.AWS_REGION }}
          
          aws lambda update-function-code \
            --function-name fitagent-message-processor-production \
            --s3-bucket fitagent-lambda-deployments-429649512384 \
            --s3-key production/lambda-latest.zip \
            --region ${{ env.AWS_REGION }}
          
          aws lambda update-function-code \
            --function-name fitagent-session-confirmation-production \
            --s3-bucket fitagent-lambda-deployments-429649512384 \
            --s3-key production/lambda-latest.zip \
            --region ${{ env.AWS_REGION }}

      - name: Wait for Lambda updates to complete
        run: |
          echo "Waiting for Lambda functions to be updated..."
          sleep 10

      - name: Redeploy API Gateway
        run: |
          API_ID=$(aws cloudformation describe-stacks \
            --stack-name fitagent-production \
            --query 'Stacks[0].Outputs[?OutputKey==`WebhookApiId`].OutputValue' \
            --output text \
            --region ${{ env.AWS_REGION }})
          
          aws apigateway create-deployment \
            --rest-api-id $API_ID \
            --stage-name production \
            --description "Auto-deploy after Lambda update" \
            --region ${{ env.AWS_REGION }}

      - name: Get API Gateway URL
        id: get-url
        run: |
          URL=$(aws cloudformation describe-stacks \
            --stack-name fitagent-production \
            --query 'Stacks[0].Outputs[?OutputKey==`WebhookApiUrl`].OutputValue' \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "webhook_url=$URL" >> $GITHUB_OUTPUT

      - name: Deployment summary
        run: |
          echo "### Production Deployment Complete! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Webhook URL:** ${{ steps.get-url.outputs.webhook_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **Next Steps:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Update Twilio webhook URL" >> $GITHUB_STEP_SUMMARY
          echo "2. Update secrets: \`./scripts/update_secrets.sh production all\`" >> $GITHUB_STEP_SUMMARY
