<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="600" height="320">
  <defs>
    <linearGradient id="logoGearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#00acc1"/>
      <stop offset="100%" stop-color="#006064"/>
    </linearGradient>
    <linearGradient id="logoDumbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#80deea"/>
      <stop offset="50%" stop-color="#26c6da"/>
      <stop offset="100%" stop-color="#00838f"/>
    </linearGradient>
    <filter id="logoGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ICON (left side, scaled down) -->
  <g transform="translate(20, 20) scale(0.56)">
