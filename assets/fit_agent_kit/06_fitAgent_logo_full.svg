    <path fill="url(#logoGearGrad)" stroke="#00e5ff" stroke-width="1.5" d="
      M 250 68
      L 268 82 L 282 77 L 292 93 L 280 108
      A 150 150 0 0 1 335 128
      L 350 122 L 363 133 L 360 150 L 344 156
      A 150 150 0 0 1 378 200
      L 393 204 L 398 218 L 388 230 L 372 226
      A 150 150 0 0 1 382 250
      A 150 150 0 0 1 372 274
      L 388 270 L 398 282 L 393 296 L 378 300
      A 150 150 0 0 1 344 344
      L 360 350 L 363 367 L 350 378 L 335 372
      A 150 150 0 0 1 280 392
      L 292 407 L 282 423 L 268 418 L 250 432
      L 232 418 L 218 423 L 208 407 L 220 392
      A 150 150 0 0 1 165 372
      L 150 378 L 137 367 L 140 350 L 156 344
      A 150 150 0 0 1 122 300
      L 107 296 L 102 282 L 112 270 L 128 274
      A 150 150 0 0 1 118 250
      A 150 150 0 0 1 128 226
      L 112 230 L 102 218 L 107 204 L 122 200
      A 150 150 0 0 1 156 156
      L 140 150 L 137 133 L 150 122 L 165 128
      A 150 150 0 0 1 220 108
      L 208 93 L 218 77 L 232 82 L 250 68 Z
    "/>
    <!-- Inner circle -->
    <circle cx="250" cy="250" r="108" fill="#003344" opacity="0.6"/>
    <circle cx="250" cy="250" r="108" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.5"/>

    <!-- Dumbbell -->
    <rect x="92" y="222" width="22" height="56" rx="4" fill="url(#logoDumbGrad)" stroke="#00e5ff" stroke-width="1.5"/>
    <rect x="108" y="212" width="18" height="76" rx="4" fill="url(#logoDumbGrad)" stroke="#00e5ff" stroke-width="1.5"/>
    <rect x="126" y="237" width="248" height="26" rx="6" fill="url(#logoDumbGrad)" stroke="#00e5ff" stroke-width="1.5"/>
    <rect x="374" y="212" width="18" height="76" rx="4" fill="url(#logoDumbGrad)" stroke="#00e5ff" stroke-width="1.5"/>
    <rect x="386" y="222" width="22" height="56" rx="4" fill="url(#logoDumbGrad)" stroke="#00e5ff" stroke-width="1.5"/>

    <!-- Hand -->
    <path fill="#4dd0e1" stroke="#00acc1" stroke-width="1.5" d="
      M 198 237 Q 192 222 204 212 Q 218 202 236 208 L 304 208 Q 322 202 336 212 Q 348 222 342 237 L 342 288 Q 345 305 330 314 Q 314 320 294 317 L 198 317 Q 178 314 172 296 Q 166 278 192 268 Z
    "/>
    <path fill="#4dd0e1" stroke="#00acc1" stroke-width="1.5" d="M 208 208 Q 202 186 213 171 Q 224 159 237 166 Q 246 174 243 194 L 240 208"/>
    <path fill="#4dd0e1" stroke="#00acc1" stroke-width="1.5" d="M 232 206 Q 228 180 239 164 Q 250 152 263 160 Q 272 168 268 190 L 264 206"/>
    <path fill="#4dd0e1" stroke="#00acc1" stroke-width="1.5" d="M 256 206 Q 254 182 265 167 Q 276 155 289 162 Q 298 171 294 192 L 290 206"/>
    <path fill="#4dd0e1" stroke="#00acc1" stroke-width="1.5" d="M 280 208 Q 280 188 291 175 Q 302 166 312 173 Q 320 182 316 200 L 312 208"/>
    <path fill="#4dd0e1" stroke="#00acc1" stroke-width="1.5" d="M 192 268 Q 170 262 164 246 Q 158 230 172 220 Q 186 212 198 224"/>
