  <!-- TEXT (right side) -->
  <!-- FIT AGENT -->
  <text x="310" y="145" 
        font-family="Arial Black, Arial, sans-serif" 
        font-weight="900" 
        font-size="72" 
        fill="#1a3a4a"
        letter-spacing="2">FIT AGENT</text>

  <!-- Divider line -->
  <line x1="310" y1="162" x2="590" y2="162" stroke="#00acc1" stroke-width="2.5"/>

  <!-- Subtitle -->
  <text x="310" y="188" 
        font-family="Arial, sans-serif" 
        font-weight="400" 
        font-size="18" 
        fill="#1a5f7a"
        letter-spacing="3">AI VIRTUAL ASSISTANT</text>
  <text x="310" y="212" 
        font-family="Arial, sans-serif" 
        font-weight="400" 
        font-size="18" 
        fill="#1a5f7a"
        letter-spacing="3">FOR PERSONAL TRAINERS</text>
</svg>
