AWSTemplateFormatVersion: '2010-09-09'
Description: 'FitAgent Infrastructure - DynamoDB Table with GSIs for Multi-Agent Architecture'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - production
    Description: Environment name for resource naming

  TableReadCapacity:
    Type: Number
    Default: 5
    Description: Read capacity units for DynamoDB table (only used if BillingMode is PROVISIONED)

  TableWriteCapacity:
    Type: Number
    Default: 5
    Description: Write capacity units for DynamoDB table (only used if BillingMode is PROVISIONED)

  BedrockModelId:
    Type: String
    Default: 'anthropic.claude-3-haiku-20240307-v1:0'
    Description: AWS Bedrock model ID

  DomainName:
    Type: String
    Default: 'fitassistant.com.br'
    Description: Custom domain name for the static website

Resources:
  # Secrets Manager for sensitive credentials
  TwilioCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'fitagent/twilio/${Environment}'
      Description: Twilio API credentials for WhatsApp messaging
      SecretString: !Sub |
        {
          "account_sid": "PLACEHOLDER_UPDATE_AFTER_DEPLOYMENT",
          "auth_token": "PLACEHOLDER_UPDATE_AFTER_DEPLOYMENT",
          "whatsapp_number": "whatsapp:+1234567890"
        }
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: FitAgent

  GoogleOAuthSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'fitagent/google-oauth/${Environment}'
      Description: Google OAuth credentials for calendar integration
      SecretString: !Sub |
        {
          "client_id": "PLACEHOLDER_UPDATE_AFTER_DEPLOYMENT",
          "client_secret": "PLACEHOLDER_UPDATE_AFTER_DEPLOYMENT"
        }
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: FitAgent

  OutlookOAuthSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'fitagent/outlook-oauth/${Environment}'
      Description: Microsoft Outlook OAuth credentials for calendar integration
      SecretString: !Sub |
        {
          "client_id": "PLACEHOLDER_UPDATE_AFTER_DEPLOYMENT",
          "client_secret": "PLACEHOLDER_UPDATE_AFTER_DEPLOYMENT"
        }
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: FitAgent

  DashboardTokenSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'fitagent/dashboard-token/${Environment}'
      Description: Pre-shared token for admin dashboard API authentication
      SecretString: !Sub |
        {
          "token": "PLACEHOLDER_UPDATE_AFTER_DEPLOYMENT"
        }
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: FitAgent

  # KMS Key for OAuth token encryption
  OAuthEncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub 'KMS key for encrypting OAuth tokens in ${Environment}'
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: Allow Lambda Execution Roles
            Effect: Allow
            Principal:
              AWS: '*'
            Action:
              - 'kms:Decrypt'
              - 'kms:Encrypt'
              - 'kms:GenerateDataKey'
            Resource: '*'
            Condition:
              StringLike:
                'aws:PrincipalArn': !Sub 'arn:aws:iam::${AWS::AccountId}:role/fitagent-*-role-${Environment}'
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: FitAgent

  OAuthEncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/fitagent-oauth-${Environment}'
      TargetKeyId: !Ref OAuthEncryptionKey

  # S3 Bucket for receipt storage
  ReceiptsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'fitagent-receipts-${Environment}-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldReceipts
            Status: Enabled
            ExpirationInDays: 2555  # 7 years for tax purposes
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: FitAgent

  # S3 Bucket for static website hosting (Privacy Policy, Terms of Service)
  StaticWebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'fitagent-static-website-${Environment}-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: FitAgent

  # CloudFront Origin Access Control for static website bucket
  StaticWebsiteCloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub 'fitagent-static-website-oac-${Environment}'
        Description: OAC for static website S3 bucket access via CloudFront
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # Bucket policy allowing access only via CloudFront OAC
  StaticWebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StaticWebsiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontServicePrincipalReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${StaticWebsiteBucket.Arn}/*'
            Condition:
              StringEquals:
                'AWS:SourceArn': !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${StaticWebsiteDistribution}'

  # CloudFront Distribution for static website
  StaticWebsiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Aliases:
          - !Ref DomainName
          - !Sub 'www.${DomainName}'
        ViewerCertificate:
          AcmCertificateArn: !Ref StaticWebsiteCertificate
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt StaticWebsiteBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !GetAtt StaticWebsiteCloudFrontOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          ForwardedValues:
            QueryString: false
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 404
            ResponsePagePath: /erro.html
            ErrorCachingMinTTL: 300
          - ErrorCode: 404
            ResponseCode: 404
            ResponsePagePath: /erro.html
            ErrorCachingMinTTL: 300
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: FitAgent

  # Route 53 Hosted Zone for custom domain
  StaticWebsiteHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: !Ref DomainName

  # ACM SSL Certificate for custom domain (must be in us-east-1 for CloudFront)
  StaticWebsiteCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      SubjectAlternativeNames:
        - !Sub 'www.${DomainName}'
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref StaticWebsiteHostedZone
        - DomainName: !Sub 'www.${DomainName}'
          HostedZoneId: !Ref StaticWebsiteHostedZone

  # DNS A record for apex domain → CloudFront
  StaticWebsiteApexARecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref StaticWebsiteHostedZone
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt StaticWebsiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  # DNS A record for www subdomain → CloudFront
  StaticWebsiteWwwARecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref StaticWebsiteHostedZone
      Name: !Sub 'www.${DomainName}'
      Type: A
      AliasTarget:
        DNSName: !GetAtt StaticWebsiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  # DNS AAAA record for apex domain → CloudFront (IPv6)
  StaticWebsiteApexAAAARecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref StaticWebsiteHostedZone
      Name: !Ref DomainName
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt StaticWebsiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  # DNS AAAA record for www subdomain → CloudFront (IPv6)
  StaticWebsiteWwwAAAARecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref StaticWebsiteHostedZone
      Name: !Sub 'www.${DomainName}'
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt StaticWebsiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  # Google Site Verification TXT record
  GoogleSiteVerificationRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref StaticWebsiteHostedZone
      Name: !Ref DomainName
      Type: TXT
      TTL: '300'
      ResourceRecords:
        - '"google-site-verification=_DUB0cj-0VNYrW1KLtgAom13P2YxIyF-H_ruRdBn2Cs"'

  FitAgentTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'fitagent-main-${Environment}'
      BillingMode: PAY_PER_REQUEST
      
      # Primary Key
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: phone_number
          AttributeType: S
        - AttributeName: entity_type
          AttributeType: S
        - AttributeName: trainer_id
          AttributeType: S
        - AttributeName: session_datetime
          AttributeType: S
        - AttributeName: payment_status_created_at
          AttributeType: S
      
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      
      # Global Secondary Indexes
      GlobalSecondaryIndexes:
        # Phone number lookup for user identification and routing
        - IndexName: phone-number-index
          KeySchema:
            - AttributeName: phone_number
              KeyType: HASH
            - AttributeName: entity_type
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        
        # Session date queries and calendar view
        - IndexName: session-date-index
          KeySchema:
            - AttributeName: trainer_id
              KeyType: HASH
            - AttributeName: session_datetime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        
        # Payment tracking and filtering by status
        - IndexName: payment-status-index
          KeySchema:
            - AttributeName: trainer_id
              KeyType: HASH
            - AttributeName: payment_status_created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      
      # Enable point-in-time recovery
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      
      # Enable encryption at rest
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
      
      # Enable streams for change data capture
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: FitAgent
        - Key: ManagedBy
          Value: CloudFormation

  # IAM Role for Message Processor Lambda
  MessageProcessorLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'fitagent-message-processor-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaSQSQueueExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:BatchWriteItem
                Resource:
                  - !GetAtt FitAgentTable.Arn
                  - !Sub '${FitAgentTable.Arn}/index/*'
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: '*'
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub '${ReceiptsBucket.Arn}/*'
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref TwilioCredentialsSecret
                  - !Ref GoogleOAuthSecret
                  - !Ref OutlookOAuthSecret
        - PolicyName: KMSAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:Encrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt OAuthEncryptionKey.Arn
        - PolicyName: SQSAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource:
                  - !GetAtt MessageQueue.Arn
                  - !GetAtt MessageDLQ.Arn
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: FitAgent

  # IAM Role for Session Confirmation Lambda
  SessionConfirmationLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'fitagent-session-confirmation-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Scan
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt FitAgentTable.Arn
                  - !Sub '${FitAgentTable.Arn}/index/*'
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref TwilioCredentialsSecret
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: FitAgent

  # IAM Role for OAuth Callback Lambda
  OAuthCallbackLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'fitagent-oauth-callback-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                Resource:
                  - !GetAtt FitAgentTable.Arn
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref TwilioCredentialsSecret
                  - !Ref GoogleOAuthSecret
                  - !Ref OutlookOAuthSecret
        - PolicyName: KMSAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:Encrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt OAuthEncryptionKey.Arn
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: FitAgent

  # Message Processor Lambda Function
  MessageProcessorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'fitagent-message-processor-${Environment}'
      Runtime: python3.12
      Handler: handlers.message_processor.lambda_handler
      Role: !GetAtt MessageProcessorLambdaRole.Arn
      Timeout: 180
      MemorySize: 1024
      Code:
        S3Bucket: fitagent-lambda-deployments-429649512384
        S3Key: production/lambda-latest.zip
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref FitAgentTable
          S3_BUCKET: !Ref ReceiptsBucket
          TWILIO_SECRET_NAME: !Ref TwilioCredentialsSecret
          GOOGLE_OAUTH_SECRET_NAME: !Ref GoogleOAuthSecret
          OUTLOOK_OAUTH_SECRET_NAME: !Ref OutlookOAuthSecret
          KMS_KEY_ALIAS: !Sub 'alias/fitagent-oauth-${Environment}'
          OAUTH_REDIRECT_URI: !Sub 'https://api.${DomainName}/oauth/callback'
          ENVIRONMENT: !Ref Environment
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          BEDROCK_REGION: !Ref AWS::Region
          OTEL_PYTHON_CONTEXT: contextvars_context
          OTEL_SDK_DISABLED: "true"
          OTEL_PROPAGATORS: "none"
          TEMPLATE_BROADCAST_SID: ""
          TEMPLATE_BROADCAST_VARS: ""
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: FitAgent

  # Webhook Handler Lambda Function
  WebhookHandlerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'fitagent-webhook-handler-${Environment}'
      Runtime: python3.12
      Handler: handlers.webhook_handler.lambda_handler
      Role: !GetAtt MessageProcessorLambdaRole.Arn
      Timeout: 10
      MemorySize: 256
      Code:
        S3Bucket: fitagent-lambda-deployments-429649512384
        S3Key: production/lambda-latest.zip
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref FitAgentTable
          SQS_QUEUE_URL: !Ref MessageQueue
          TWILIO_SECRET_NAME: !Ref TwilioCredentialsSecret
          ENVIRONMENT: !Ref Environment
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: FitAgent

  # OAuth Callback Lambda Function
  OAuthCallbackFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'fitagent-oauth-callback-${Environment}'
      Runtime: python3.12
      Handler: handlers.oauth_callback.lambda_handler
      Role: !GetAtt OAuthCallbackLambdaRole.Arn
      Timeout: 30
      MemorySize: 512
      Code:
        S3Bucket: fitagent-lambda-deployments-429649512384
        S3Key: production/lambda-latest.zip
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref FitAgentTable
          TWILIO_SECRET_NAME: !Ref TwilioCredentialsSecret
          GOOGLE_OAUTH_SECRET_NAME: !Ref GoogleOAuthSecret
          OUTLOOK_OAUTH_SECRET_NAME: !Ref OutlookOAuthSecret
          KMS_KEY_ALIAS: !Sub 'alias/fitagent-oauth-${Environment}'
          OAUTH_REDIRECT_URI: !Sub 'https://api.${DomainName}/oauth/callback'
          ENVIRONMENT: !Ref Environment
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: FitAgent

  # IAM Role for Dashboard Lambda
  DashboardLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'fitagent-dashboard-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:GetItem
                Resource:
                  - !GetAtt FitAgentTable.Arn
                  - !Sub '${FitAgentTable.Arn}/index/*'
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref DashboardTokenSecret
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: FitAgent

  # Dashboard Lambda Function
  DashboardFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'fitagent-dashboard-${Environment}'
      Runtime: python3.12
      Handler: handlers.dashboard_handler.lambda_handler
      Role: !GetAtt DashboardLambdaRole.Arn
      Timeout: 30
      MemorySize: 512
      Code:
        S3Bucket: fitagent-lambda-deployments-429649512384
        S3Key: production/lambda-latest.zip
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref FitAgentTable
          DASHBOARD_TOKEN_SECRET_NAME: !Ref DashboardTokenSecret
          ENVIRONMENT: !Ref Environment
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: FitAgent

  # SQS FIFO Queue for message processing with ordering guarantees
  MessageQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'fitagent-messages-${Environment}.fifo'
      FifoQueue: true
      ContentBasedDeduplication: true
      VisibilityTimeout: 300  # 5 minutes - allows Lambda to process and retry
      MessageRetentionPeriod: 1209600  # 14 days
      ReceiveMessageWaitTimeSeconds: 20  # Long polling to reduce empty receives
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt MessageDLQ.Arn
        maxReceiveCount: 3  # Retry 3 times before moving to DLQ
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: FitAgent

  # Dead Letter Queue (FIFO)
  MessageDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'fitagent-messages-dlq-${Environment}.fifo'
      FifoQueue: true
      MessageRetentionPeriod: 1209600
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: FitAgent

  # SNS Topic for DLQ Alarm Notifications
  # Note: After deployment, subscribe to this topic to receive DLQ alarm notifications
  # Example: aws sns subscribe --topic-arn <DLQAlarmTopicArn> --protocol email --notification-endpoint your-email@example.com
  DLQAlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 'fitagent-dlq-alarm-${Environment}'
      DisplayName: FitAgent DLQ Alarm Notifications
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: FitAgent

  # CloudWatch Alarm for DLQ Messages
  MessageDLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'fitagent-dlq-messages-${Environment}'
      AlarmDescription: Alert when messages are in the Dead Letter Queue
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Statistic: Sum
      Period: 300  # 5 minutes
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt MessageDLQ.QueueName
      AlarmActions:
        - !Ref DLQAlarmTopic
      TreatMissingData: notBreaching
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: FitAgent

  # SQS Event Source Mapping for Message Processor
  MessageProcessorEventSource:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt MessageQueue.Arn
      FunctionName: !Ref MessageProcessorFunction
      BatchSize: 1
      MaximumBatchingWindowInSeconds: 0
      FunctionResponseTypes:
        - ReportBatchItemFailures
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: FitAgent

  # Session Confirmation Lambda Function
  SessionConfirmationFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'fitagent-session-confirmation-${Environment}'
      Runtime: python3.12
      Handler: handlers.session_confirmation.lambda_handler
      Role: !GetAtt SessionConfirmationLambdaRole.Arn
      Timeout: 60
      MemorySize: 512
      Code:
        S3Bucket: fitagent-lambda-deployments-429649512384
        S3Key: production/lambda-latest.zip
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref FitAgentTable
          TWILIO_SECRET_NAME: !Ref TwilioCredentialsSecret
          ENVIRONMENT: !Ref Environment
          TEMPLATE_SESSION_REMINDER_SID: ""
          TEMPLATE_SESSION_REMINDER_VARS: ""
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: FitAgent

  # EventBridge Rule for Session Confirmation
  SessionConfirmationRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub 'session-confirmation-trigger-${Environment}'
      Description: Triggers session confirmation handler every 5 minutes
      ScheduleExpression: "cron(*/5 * * * ? *)"
      State: ENABLED
      Targets:
        - Arn: !GetAtt SessionConfirmationFunction.Arn
          Id: SessionConfirmationTarget
      EventBusName: default

  # Lambda Permission for EventBridge Invocation
  SessionConfirmationPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SessionConfirmationFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt SessionConfirmationRule.Arn

  # Payment Reminder Lambda Function
  PaymentReminderFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'fitagent-payment-reminder-${Environment}'
      Runtime: python3.12
      Handler: handlers.payment_reminder.lambda_handler
      Role: !GetAtt SessionConfirmationLambdaRole.Arn
      Timeout: 120
      MemorySize: 512
      Code:
        S3Bucket: fitagent-lambda-deployments-429649512384
        S3Key: production/lambda-latest.zip
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref FitAgentTable
          TWILIO_SECRET_NAME: !Ref TwilioCredentialsSecret
          ENVIRONMENT: !Ref Environment
          TEMPLATE_PAYMENT_REMINDER_SID: ""
          TEMPLATE_PAYMENT_REMINDER_VARS: ""
      Tags: (runs at 10:00 UTC = 07:00 BRT)
  PaymentReminderRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub 'payment-reminder-trigger-${Environment}'
      Description: Triggers payment reminder handler daily at 10:00 UTC
      ScheduleExpression: "cron(0 10 * * ? *)"
      State: ENABLED
      Targets:
        - Arn: !GetAtt PaymentReminderFunction.Arn
          Id: PaymentReminderTarget
      EventBusName: default

  # Lambda Permission for Payment Reminder EventBridge Invocation
  PaymentReminderPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PaymentReminderFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt PaymentReminderRule.Arn

  # API Gateway for Webhook
  WebhookApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub 'fitagent-webhook-api-${Environment}'
      Description: API Gateway for Twilio WhatsApp webhook
      EndpointConfiguration:
        Types:
          - REGIONAL
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: FitAgent

  WebhookResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref WebhookApi
      ParentId: !GetAtt WebhookApi.RootResourceId
      PathPart: webhook

  WebhookMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref WebhookApi
      ResourceId: !Ref WebhookResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebhookHandlerFunction.Arn}/invocations'
      MethodResponses:
        - StatusCode: 200

  # OAuth Callback API Resources
  OAuthResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref WebhookApi
      ParentId: !GetAtt WebhookApi.RootResourceId
      PathPart: oauth

  OAuthCallbackResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref WebhookApi
      ParentId: !Ref OAuthResource
      PathPart: callback

  OAuthCallbackMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref WebhookApi
      ResourceId: !Ref OAuthCallbackResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OAuthCallbackFunction.Arn}/invocations'
      MethodResponses:
        - StatusCode: 200

  # Dashboard API Gateway Resources
  DashboardResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref WebhookApi
      ParentId: !GetAtt WebhookApi.RootResourceId
      PathPart: dashboard

  DashboardAuthResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref WebhookApi
      ParentId: !Ref DashboardResource
      PathPart: auth

  DashboardAuthMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref WebhookApi
      ResourceId: !Ref DashboardAuthResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${DashboardFunction.Arn}/invocations'
      MethodResponses:
        - StatusCode: 200

  DashboardAuthOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref WebhookApi
      ResourceId: !Ref DashboardAuthResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  DashboardMetricsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref WebhookApi
      ParentId: !Ref DashboardResource
      PathPart: metrics

  DashboardMetricsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref WebhookApi
      ResourceId: !Ref DashboardMetricsResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${DashboardFunction.Arn}/invocations'
      MethodResponses:
        - StatusCode: 200

  DashboardMetricsOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref WebhookApi
      ResourceId: !Ref DashboardMetricsResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  WebhookDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - WebhookMethod
      - OAuthCallbackMethod
      - DashboardAuthMethod
      - DashboardAuthOptionsMethod
      - DashboardMetricsMethod
      - DashboardMetricsOptionsMethod
    Properties:
      RestApiId: !Ref WebhookApi
      StageName: !Ref Environment

  WebhookLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WebhookHandlerFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebhookApi}/*/*/*'

  OAuthCallbackLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref OAuthCallbackFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebhookApi}/*/*/*'

  DashboardLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DashboardFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebhookApi}/*/*/*'

  # ACM SSL Certificate for API subdomain (api.fitassistant.com.br)
  ApiCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Sub 'api.${DomainName}'
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Sub 'api.${DomainName}'
          HostedZoneId: !Ref StaticWebsiteHostedZone

  # API Gateway Custom Domain Name for api.fitassistant.com.br
  ApiGatewayCustomDomain:
    Type: AWS::ApiGateway::DomainName
    Properties:
      DomainName: !Sub 'api.${DomainName}'
      RegionalCertificateArn: !Ref ApiCertificate
      EndpointConfiguration:
        Types:
          - REGIONAL
      SecurityPolicy: TLS_1_2

  # Base Path Mapping - maps root (/) of custom domain to API Gateway stage
  ApiBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Properties:
      DomainName: !Ref ApiGatewayCustomDomain
      RestApiId: !Ref WebhookApi
      Stage: !Ref Environment

  # DNS A-alias record for API subdomain → API Gateway regional endpoint
  ApiDnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref StaticWebsiteHostedZone
      Name: !Sub 'api.${DomainName}'
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApiGatewayCustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt ApiGatewayCustomDomain.RegionalHostedZoneId

Outputs:
  TableName:
    Description: DynamoDB table name
    Value: !Ref FitAgentTable
    Export:
      Name: !Sub '${AWS::StackName}-TableName'
  
  TableArn:
    Description: DynamoDB table ARN
    Value: !GetAtt FitAgentTable.Arn
    Export:
      Name: !Sub '${AWS::StackName}-TableArn'
  
  TableStreamArn:
    Description: DynamoDB table stream ARN
    Value: !GetAtt FitAgentTable.StreamArn
    Export:
      Name: !Sub '${AWS::StackName}-TableStreamArn'
  
  ReceiptsBucketName:
    Description: S3 bucket for receipt storage
    Value: !Ref ReceiptsBucket
    Export:
      Name: !Sub '${AWS::StackName}-ReceiptsBucket'

  TwilioSecretArn:
    Description: Twilio credentials secret ARN
    Value: !Ref TwilioCredentialsSecret
    Export:
      Name: !Sub '${AWS::StackName}-TwilioSecret'

  GoogleOAuthSecretArn:
    Description: Google OAuth credentials secret ARN
    Value: !Ref GoogleOAuthSecret
    Export:
      Name: !Sub '${AWS::StackName}-GoogleOAuthSecret'

  OutlookOAuthSecretArn:
    Description: Outlook OAuth credentials secret ARN
    Value: !Ref OutlookOAuthSecret
    Export:
      Name: !Sub '${AWS::StackName}-OutlookOAuthSecret'

  KMSKeyId:
    Description: KMS key ID for OAuth encryption
    Value: !Ref OAuthEncryptionKey
    Export:
      Name: !Sub '${AWS::StackName}-KMSKeyId'

  KMSKeyArn:
    Description: KMS key ARN for OAuth encryption
    Value: !GetAtt OAuthEncryptionKey.Arn
    Export:
      Name: !Sub '${AWS::StackName}-KMSKeyArn'
  
  PhoneNumberIndexName:
    Description: Phone number GSI name
    Value: phone-number-index
    Export:
      Name: !Sub '${AWS::StackName}-PhoneNumberIndex'
  
  SessionDateIndexName:
    Description: Session date GSI name
    Value: session-date-index
    Export:
      Name: !Sub '${AWS::StackName}-SessionDateIndex'
  
  PaymentStatusIndexName:
    Description: Payment status GSI name
    Value: payment-status-index
    Export:
      Name: !Sub '${AWS::StackName}-PaymentStatusIndex'

  SessionConfirmationFunctionArn:
    Description: Session Confirmation Lambda function ARN
    Value: !GetAtt SessionConfirmationFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-SessionConfirmationFunctionArn'

  SessionConfirmationFunctionName:
    Description: Session Confirmation Lambda function name
    Value: !Ref SessionConfirmationFunction
    Export:
      Name: !Sub '${AWS::StackName}-SessionConfirmationFunctionName'

  SessionConfirmationRuleArn:
    Description: Session Confirmation EventBridge rule ARN
    Value: !GetAtt SessionConfirmationRule.Arn
    Export:
      Name: !Sub '${AWS::StackName}-SessionConfirmationRuleArn'

  SessionConfirmationRuleName:
    Description: Session Confirmation EventBridge rule name
    Value: !Ref SessionConfirmationRule
    Export:
      Name: !Sub '${AWS::StackName}-SessionConfirmationRuleName'

  MessageProcessorFunctionArn:
    Description: Message Processor Lambda function ARN
    Value: !GetAtt MessageProcessorFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-MessageProcessorFunctionArn'

  MessageProcessorFunctionName:
    Description: Message Processor Lambda function name
    Value: !Ref MessageProcessorFunction
    Export:
      Name: !Sub '${AWS::StackName}-MessageProcessorFunctionName'

  WebhookHandlerFunctionArn:
    Description: Webhook Handler Lambda function ARN
    Value: !GetAtt WebhookHandlerFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-WebhookHandlerFunctionArn'

  WebhookHandlerFunctionName:
    Description: Webhook Handler Lambda function name
    Value: !Ref WebhookHandlerFunction
    Export:
      Name: !Sub '${AWS::StackName}-WebhookHandlerFunctionName'

  WebhookApiUrl:
    Description: Webhook API Gateway URL for Twilio configuration
    Value: !Sub 'https://${WebhookApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/webhook'
    Export:
      Name: !Sub '${AWS::StackName}-WebhookApiUrl'

  OAuthCallbackUrl:
    Description: OAuth callback URL for Google/Outlook calendar integration
    Value: !Sub 'https://${WebhookApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/oauth/callback'
    Export:
      Name: !Sub '${AWS::StackName}-OAuthCallbackUrl'

  WebhookApiId:
    Description: API Gateway ID
    Value: !Ref WebhookApi
    Export:
      Name: !Sub '${AWS::StackName}-WebhookApiId'

  OAuthCallbackFunctionArn:
    Description: OAuth Callback Lambda function ARN
    Value: !GetAtt OAuthCallbackFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-OAuthCallbackFunctionArn'

  OAuthCallbackFunctionName:
    Description: OAuth Callback Lambda function name
    Value: !Ref OAuthCallbackFunction
    Export:
      Name: !Sub '${AWS::StackName}-OAuthCallbackFunctionName'

  DLQAlarmTopicArn:
    Description: SNS Topic ARN for DLQ alarm notifications
    Value: !Ref DLQAlarmTopic
    Export:
      Name: !Sub '${AWS::StackName}-DLQAlarmTopicArn'

  DLQAlarmTopicName:
    Description: SNS Topic name for DLQ alarm notifications
    Value: !GetAtt DLQAlarmTopic.TopicName
    Export:
      Name: !Sub '${AWS::StackName}-DLQAlarmTopicName'

  DLQAlarmArn:
    Description: CloudWatch Alarm ARN for DLQ messages (used for rollback triggers)
    Value: !GetAtt MessageDLQAlarm.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DLQAlarmArn'

  StaticWebsiteBucketName:
    Description: S3 bucket name for deploying static website HTML files
    Value: !Ref StaticWebsiteBucket
    Export:
      Name: !Sub '${AWS::StackName}-StaticWebsiteBucketName'

  StaticWebsiteUrl:
    Description: CloudFront distribution URL for the static website
    Value: !Sub 'https://${StaticWebsiteDistribution.DomainName}'
    Export:
      Name: !Sub '${AWS::StackName}-StaticWebsiteUrl'

  HostedZoneNameServers:
    Description: Route 53 hosted zone nameservers for registro.br configuration
    Value: !Join
      - ','
      - !GetAtt StaticWebsiteHostedZone.NameServers
    Export:
      Name: !Sub '${AWS::StackName}-HostedZoneNameServers'

  CertificateArn:
    Description: ACM certificate ARN for the custom domain
    Value: !Ref StaticWebsiteCertificate
    Export:
      Name: !Sub '${AWS::StackName}-CertificateArn'

  StaticWebsiteCustomUrl:
    Description: Custom domain URL for the static website
    Value: !Sub 'https://${DomainName}'
    Export:
      Name: !Sub '${AWS::StackName}-StaticWebsiteCustomUrl'

  StaticWebsiteDistributionId:
    Description: CloudFront distribution ID for deploy script
    Value: !Ref StaticWebsiteDistribution
    Export:
      Name: !Sub '${AWS::StackName}-StaticWebsiteDistributionId'

  ApiCustomDomainUrl:
    Description: API custom domain base URL
    Value: !Sub 'https://api.${DomainName}'
    Export:
      Name: !Sub '${AWS::StackName}-ApiCustomDomainUrl'

  ApiCustomWebhookUrl:
    Description: Webhook URL using the API custom domain
    Value: !Sub 'https://api.${DomainName}/webhook'
    Export:
      Name: !Sub '${AWS::StackName}-ApiCustomWebhookUrl'

  ApiCustomOAuthCallbackUrl:
    Description: OAuth callback URL using the API custom domain
    Value: !Sub 'https://api.${DomainName}/oauth/callback'
    Export:
      Name: !Sub '${AWS::StackName}-ApiCustomOAuthCallbackUrl'

  ApiCertificateArn:
    Description: ACM certificate ARN for the API subdomain
    Value: !Ref ApiCertificate
    Export:
      Name: !Sub '${AWS::StackName}-ApiCertificateArn'

  DashboardTokenSecretArn:
    Description: Dashboard token secret ARN
    Value: !Ref DashboardTokenSecret
    Export:
      Name: !Sub '${AWS::StackName}-DashboardTokenSecret'

  DashboardFunctionArn:
    Description: Dashboard Lambda function ARN
    Value: !GetAtt DashboardFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DashboardFunctionArn'

  DashboardFunctionName:
    Description: Dashboard Lambda function name
    Value: !Ref DashboardFunction
    Export:
      Name: !Sub '${AWS::StackName}-DashboardFunctionName'

  DashboardAuthUrl:
    Description: Dashboard auth endpoint URL
    Value: !Sub 'https://api.${DomainName}/dashboard/auth'
    Export:
      Name: !Sub '${AWS::StackName}-DashboardAuthUrl'

  DashboardMetricsUrl:
    Description: Dashboard metrics endpoint URL
    Value: !Sub 'https://api.${DomainName}/dashboard/metrics'
    Export:
      Name: !Sub '${AWS::StackName}-DashboardMetricsUrl'
