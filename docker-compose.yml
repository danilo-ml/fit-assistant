services:
  localstack:
    image: localstack/localstack:latest
    container_name: fitagent-localstack
    ports:
      - "4566:4566"
      - "4571:4571"
    environment:
      - SERVICES=dynamodb,s3,sqs,lambda,apigateway,events,secretsmanager,kms
      - DEBUG=1
      - LAMBDA_EXECUTOR=docker
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "./localstack-init:/etc/localstack/init/ready.d"
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - fitagent-network

  api:
    build: .
    container_name: fitagent-api
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=local
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_REGION=us-east-1
      - DYNAMODB_TABLE=fitagent-main
      - S3_BUCKET=fitagent-receipts-local
      - SQS_QUEUE_URL=http://localstack:4566/000000000000/fitagent-messages.fifo
      - NOTIFICATION_QUEUE_URL=http://localstack:4566/000000000000/fitagent-notifications.fifo
      - DLQ_URL=http://localstack:4566/000000000000/fitagent-messages-dlq.fifo
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_WHATSAPP_NUMBER=${TWILIO_WHATSAPP_NUMBER}
      - SKIP_TWILIO_SIGNATURE_VALIDATION=${SKIP_TWILIO_SIGNATURE_VALIDATION:-true}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - OUTLOOK_CLIENT_ID=${OUTLOOK_CLIENT_ID}
      - OUTLOOK_CLIENT_SECRET=${OUTLOOK_CLIENT_SECRET}
      - OAUTH_REDIRECT_URI=http://localhost:8000/oauth/callback
      - DASHBOARD_TOKEN_SECRET_NAME=fitagent/dashboard-token/local
    depends_on:
      - localstack
    volumes:
      - "./src:/app/src"
      - "./tests:/app/tests"
      - "./static-website:/app/static-website"
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - fitagent-network

  sqs-processor:
    build: .
    container_name: fitagent-sqs-processor
    environment:
      - ENVIRONMENT=local
      - AWS_ENDPOINT_URL=http://localstack:4566
      # For LocalStack services (DynamoDB, S3, SQS), use test credentials
      - LOCALSTACK_ACCESS_KEY_ID=test
      - LOCALSTACK_SECRET_ACCESS_KEY=test
      - AWS_REGION=us-east-1
      # Bedrock Configuration - uses real AWS with SSO temporary credentials
      # Get credentials by running: ./scripts/export_sso_credentials.sh
      - AWS_ACCESS_KEY_ID=${BEDROCK_AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${BEDROCK_AWS_SECRET_ACCESS_KEY:-test}
      - AWS_SESSION_TOKEN=${BEDROCK_AWS_SESSION_TOKEN:-}
      - AWS_BEDROCK_ENDPOINT_URL=
      - BEDROCK_MODEL_ID=${BEDROCK_MODEL_ID:-anthropic.claude-3-sonnet-20240229-v1:0}
      - BEDROCK_REGION=${BEDROCK_REGION:-us-east-1}
      # Other services
      - DYNAMODB_TABLE=fitagent-main
      - S3_BUCKET=fitagent-receipts-local
      - SQS_QUEUE_URL=http://localstack:4566/000000000000/fitagent-messages.fifo
      - NOTIFICATION_QUEUE_URL=http://localstack:4566/000000000000/fitagent-notifications.fifo
      - DLQ_URL=http://localstack:4566/000000000000/fitagent-messages-dlq.fifo
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_WHATSAPP_NUMBER=${TWILIO_WHATSAPP_NUMBER}
    depends_on:
      - localstack
    volumes:
      - "./src:/app/src"
    command: python -m src.local_sqs_poller
    networks:
      - fitagent-network

networks:
  fitagent-network:
    driver: bridge
