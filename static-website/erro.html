<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Não Encontrada - FitAgent</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #fafafa;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 0 1.5rem; }
        header {
            background-color: #1a1a2e;
            color: #fff;
            padding: 1rem 0;
        }
        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        header .logo { font-size: 1.5rem; font-weight: 700; text-decoration: none; color: #fff; }
        header nav a {
            color: #ccc;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        header nav a:hover { color: #fff; }
        main { padding: 2rem 0 3rem; }
        main .container h1 { font-size: 1.75rem; margin-bottom: 0.5rem; color: #1a1a2e; }
        main .container .updated { font-size: 0.85rem; color: #777; margin-bottom: 2rem; }
        main .container h2 { font-size: 1.25rem; margin-top: 2rem; margin-bottom: 0.75rem; color: #1a1a2e; }
        main .container p, main .container ul { margin-bottom: 1rem; }
        main .container ul { padding-left: 1.5rem; }
        main .container li { margin-bottom: 0.4rem; }
        .error-content { text-align: center; padding: 3rem 0; }
        .error-content h1 { font-size: 4rem; margin-bottom: 1rem; }
        .error-content p { font-size: 1.1rem; margin-bottom: 1.5rem; }
        .error-links { display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap; }
        .error-links a {
            color: #1a1a2e;
            text-decoration: none;
            padding: 0.6rem 1.2rem;
            border: 2px solid #1a1a2e;
            border-radius: 4px;
            transition: background-color 0.2s, color 0.2s;
        }
        .error-links a:hover { background-color: #1a1a2e; color: #fff; }
        footer {
            background-color: #1a1a2e;
            color: #aaa;
            padding: 1.5rem 0;
            font-size: 0.85rem;
        }
        footer .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        footer a { color: #ccc; text-decoration: none; }
        footer a:hover { color: #fff; }
        @media (max-width: 600px) {
            header .container { flex-direction: column; text-align: center; }
            footer .container { flex-direction: column; text-align: center; }
            .error-content h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <span class="logo">FitAgent</span>
        </div>
    </header>
    <main>
        <div class="container">
            <div class="error-content">
                <h1>404</h1>
                <p>Ops! A página que você está procurando não foi encontrada.</p>
                <p>Verifique o endereço digitado ou acesse uma das páginas abaixo:</p>
                <div class="error-links">
                    <a href="index.html">Início</a>
                    <a href="privacidade.html">Política de Privacidade</a>
                    <a href="termos.html">Termos de Serviço</a>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <div class="container">
            <span>&copy; 2026 FitAgent. Todos os direitos reservados.</span>
            <nav>
                <a href="index.html">Início</a> &middot;
                <a href="privacidade.html">Política de Privacidade</a> &middot;
                <a href="termos.html">Termos de Serviço</a>
            </nav>
        </div>
    </footer>
</body>
</html>
